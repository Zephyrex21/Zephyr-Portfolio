<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Saurabh Raj Shekhar</title>
  <link rel="icon" type="image/png" href="/favicon.ico.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --primary: #00FF66; }

    body {
      background: #0A0A0A;
      color: #ffffff;
      font-family: "Inter", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .label {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 1.5rem;
    }

    .code {
      font-family: "Outfit", sans-serif;
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 800;
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: #fff;
      margin-bottom: 1.5rem;
    }

    .code span { color: var(--primary); }

    h1 {
      font-family: "Outfit", sans-serif;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: rgba(255,255,255,0.85);
    }

    p {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--primary);
      color: #0A0A0A;
      border-radius: 9999px;
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .btn:hover { background: #fff; transform: translateY(-1px); }

    /* Animated dot */
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #0A0A0A;
      border-radius: 50%;
      animation: ping 1.2s ease-in-out infinite;
    }
    @keyframes ping {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.5); opacity: 0.6; }
    }

    .corner {
      position: fixed;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
    .corner.tl { top: 24px; left: 24px; }
    .corner.br { bottom: 24px; right: 24px; color: var(--primary); }
  </style>
</head>
<body>
  <div class="corner tl">ZEPHYREX.21</div>
  <div class="corner br">STATUS: LOST</div>

  <div class="container">
    <div class="label">// ERROR_404</div>
    <div class="code">4<span>0</span>4</div>
    <h1>Page Not Found</h1>
    <p>
      Looks like this page doesn't exist — or was moved.<br>
      Head back to the portfolio.
    </p>
    <a href="/" class="btn">
      <span class="dot"></span>
      Back to Home
    </a>
  </div>
</body>
</html>
